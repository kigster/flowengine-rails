name: RSpec

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['4.0']

    steps:
      - uses: actions/checkout@v4
      - name: Checkout flowengine core
        uses: actions/checkout@v4
        with:
          repository: kigster/flowengine
          path: flowengine
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec rspec
